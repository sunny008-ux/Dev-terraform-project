name: Install ArgoCD via Ansible

on:
  workflow_dispatch:

jobs:
  install-argocd:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Ansible
        run: |
          sudo apt update
          sudo apt install -y ansible

      - name: Setup SSH Key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

      - name: Create Inventory File
        run: |
          echo "[k8s_master]" > inventory.ini
          echo "${{ secrets.MASTER_PUBLIC_IP }} ansible_user=ubuntu ansible_ssh_private_key_file=~/.ssh/id_rsa" >> inventory.ini

      - name: Run Playbook
        run: ansible-playbook -i inventory.ini Ansible/install-argocd.yml
