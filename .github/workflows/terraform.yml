name: Full K8s + ArgoCD Deployment

on:
  workflow_dispatch:
    inputs:
      action:
        description: "Choose action"
        required: true
        default: "apply"
        type: choice
        options:
          - apply
          - destroy

jobs:
  deploy:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: env/dev

    steps:

      # Checkout repository
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Setup Terraform
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      # Configure AWS Credentials
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      # Terraform Init
      - name: Terraform Init
        run: terraform init

      # Terraform Apply
      - name: Terraform Apply
        if: github.event.inputs.action == 'apply'
        run: terraform apply -auto-approve

      # Get Master Public IP
      - name: Get Master Public IP
        if: github.event.inputs.action == 'apply'
        run: |
          MASTER_IP=$(terraform output -raw master_public_ip)
          echo "MASTER_IP=$MASTER_IP" >> $GITHUB_ENV
          echo "Master IP: $MASTER_IP"

      # Get Worker IPs
      - name: Get Worker IPs
        if: github.event.inputs.action == 'apply'
        run: |
          WORKER1=$(terraform output -raw worker1_public_ip)
          WORKER2=$(terraform output -raw worker2_public_ip)

          echo "WORKER1=$WORKER1" >> $GITHUB_ENV
          echo "WORKER2=$WORKER2" >> $GITHUB_ENV

          echo "Worker1 IP: $WORKER1"
          echo "Worker2 IP: $WORKER2"

      # Install Ansible
      - name: Install Ansible
        if: github.event.inputs.action == 'apply'
        run: |
          sudo apt-get update
          sudo apt-get install -y ansible

      # Setup SSH Key
      - name: Setup SSH Key
        if: github.event.inputs.action == 'apply'
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

      # Wait for SSH availability
      - name: Wait for SSH
        if: github.event.inputs.action == 'apply'
        run: |
          echo "Waiting for SSH on $MASTER_IP..."

          for i in {1..30}; do
            if ssh -o StrictHostKeyChecking=no \
                   -o ConnectTimeout=5 \
                   ubuntu@$MASTER_IP "echo SSH Ready"; then
              echo "SSH Ready"
              break
            fi
            sleep 15
          done

      # Wait for Kubernetes init
      - name: Wait for Kubernetes init
        if: github.event.inputs.action == 'apply'
        run: |
          echo "Waiting for kubeadm init..."
          sleep 120

      # Get kubeadm join command
      - name: Get Join Command
        if: github.event.inputs.action == 'apply'
        run: |
          JOIN_CMD=$(ssh -o StrictHostKeyChecking=no ubuntu@$MASTER_IP "sudo kubeadm token create --print-join-command")
          echo "JOIN_CMD=$JOIN_CMD" >> $GITHUB_ENV
          echo "Join command retrieved"

      # Join Worker 1
      - name: Join Worker 1
        if: github.event.inputs.action == 'apply'
        run: |
          echo "Joining worker1"
          ssh -o StrictHostKeyChecking=no ubuntu@$WORKER1 "sudo $JOIN_CMD"

      # Join Worker 2
      - name: Join Worker 2
        if: github.event.inputs.action == 'apply'
        run: |
          echo "Joining worker2"
          ssh -o StrictHostKeyChecking=no ubuntu@$WORKER2 "sudo $JOIN_CMD"

      # Wait for cluster stabilization
      - name: Wait for cluster stabilization
        if: github.event.inputs.action == 'apply'
        run: sleep 60

      # Create Ansible inventory
      - name: Create Inventory
        if: github.event.inputs.action == 'apply'
        run: |
          echo "[k8s_master]" > inventory.ini
          echo "$MASTER_IP ansible_user=ubuntu ansible_ssh_private_key_file=~/.ssh/id_rsa ansible_ssh_common_args='-o StrictHostKeyChecking=no'" >> inventory.ini

      # Install ArgoCD via Ansible
      - name: Install ArgoCD via Ansible
        if: github.event.inputs.action == 'apply'
        run: |
          ANSIBLE_HOST_KEY_CHECKING=False \
          ansible-playbook -i inventory.ini ../../Ansible/install-argocd.yml

      # Terraform Destroy
      - name: Terraform Destroy
        if: github.event.inputs.action == 'destroy'
        run: terraform destroy -auto-approve
