name: Full K8s + ArgoCD Deployment

on:
  workflow_dispatch:
    inputs:
      action:
        description: "Choose action"
        required: true
        default: "apply"
        type: choice
        options:
          - apply
          - destroy

jobs:
  deploy:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: env/dev

    steps:

      # -------------------------------
      # Checkout Repository
      # -------------------------------
      - name: Checkout Repository
        uses: actions/checkout@v4

      # -------------------------------
      # Setup Terraform
      # -------------------------------
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      # -------------------------------
      # Configure AWS Credentials
      # -------------------------------
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      # -------------------------------
      # Terraform Init
      # -------------------------------
      - name: Terraform Init
        run: terraform init

      # -------------------------------
      # Terraform Apply
      # -------------------------------
      - name: Terraform Apply
        if: github.event.inputs.action == 'apply'
        run: terraform apply -auto-approve

      # -------------------------------
      # Get Master Public IP
      # -------------------------------
      - name: Get Master Public IP
        if: github.event.inputs.action == 'apply'
        run: |
          MASTER_IP=$(terraform output -raw master_public_ip)

          if [ -z "$MASTER_IP" ]; then
            echo "Terraform output master_public_ip is empty"
            exit 1
          fi

          echo "MASTER_IP=$MASTER_IP" >> $GITHUB_ENV
          echo "Master node IP: $MASTER_IP"

      # -------------------------------
      # Install Ansible
      # -------------------------------
      - name: Install Ansible
        if: github.event.inputs.action == 'apply'
        run: |
          sudo apt-get update
          sudo apt-get install -y ansible

      # -------------------------------
      # Setup SSH Key
      # -------------------------------
      - name: Setup SSH Key
        if: github.event.inputs.action == 'apply'
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

      # -------------------------------
      # Wait for SSH
      # -------------------------------
      - name: Wait for SSH
        if: github.event.inputs.action == 'apply'
        run: |
          echo "Waiting for SSH on $MASTER_IP..."

          for i in {1..30}; do
            if ssh -o StrictHostKeyChecking=no \
                   -o ServerAliveInterval=30 \
                   -o ServerAliveCountMax=10 \
                   -o ConnectTimeout=5 \
                   ubuntu@$MASTER_IP "echo SSH Ready"; then
              echo "SSH connection successful"
              exit 0
            fi

            echo "SSH not ready yet... retrying"
            sleep 15
          done

          echo "SSH never became ready"
          exit 1

      # -------------------------------
      # Give Kubernetes time to stabilize
      # -------------------------------
      - name: Wait for Kubernetes to stabilize
        if: github.event.inputs.action == 'apply'
        run: |
          echo "Waiting for Kubernetes control plane components..."
          sleep 120

      # -------------------------------
      # Create Dynamic Inventory
      # -------------------------------
      - name: Create Inventory
        if: github.event.inputs.action == 'apply'
        run: |
          echo "[k8s_master]" > inventory.ini
          echo "$MASTER_IP ansible_user=ubuntu ansible_ssh_private_key_file=~/.ssh/id_rsa ansible_ssh_common_args='-o StrictHostKeyChecking=no -o ServerAliveInterval=30 -o ServerAliveCountMax=10'" >> inventory.ini

      # -------------------------------
      # Run Ansible Playbook
      # -------------------------------
      - name: Install ArgoCD via Ansible
        if: github.event.inputs.action == 'apply'
        run: |
          ANSIBLE_HOST_KEY_CHECKING=False \
          ansible-playbook -i inventory.ini ../../Ansible/install-argocd.yml

      # -------------------------------
      # Terraform Destroy
      # -------------------------------
      - name: Terraform Destroy
        if: github.event.inputs.action == 'destroy'
        run: terraform destroy -auto-approve
